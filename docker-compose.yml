version: "3.9"

x-django-env: &django-env
  DJANGO_DEBUG: "true"
  JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev-only-jwt-secret-change-me}
  JWT_ACCESS_TTL_MINUTES: "15"
  JWT_REFRESH_TTL_DAYS: "7"
  REDIS_URL: redis://redis:6379/0
  CELERY_BROKER_URL: amqp://servicehub:servicehub@rabbitmq:5672//
  CELERY_RESULT_BACKEND: redis://redis:6379/1

services:
  # ---------- Infrastructure ----------
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: servicehub
      POSTGRES_PASSWORD: servicehub
      POSTGRES_MULTIPLE_DATABASES: auth_db,user_db,provider_db,booking_db,review_db,payment_db,search_db,chat_db,media_db,analytics_db,notification_db
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./infra/postgres-init:/docker-entrypoint-initdb.d
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U servicehub"]
      interval: 5s
      timeout: 5s
      retries: 15

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: servicehub
      RABBITMQ_DEFAULT_PASS: servicehub
    ports:
      - "5672:5672"
      - "15672:15672" # management UI
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 10

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports: ["9200:9200"]
    volumes: ["es_data:/usr/share/elasticsearch/data"]
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15

  # ---------- Auth Service ----------
  auth-service:
    build: ./services/auth-service
    environment:
      <<: *django-env
      DATABASE_URL: postgres://servicehub:servicehub@postgres:5432/auth_db
      PORT: "8001"
    depends_on: { postgres: { condition: service_healthy }, redis: { condition: service_healthy } }
    ports: ["8001:8001"]
    command: web

  # ---------- User Service ----------
  user-service:
    build: ./services/user-service
    environment:
      <<: *django-env
      DATABASE_URL: postgres://servicehub:servicehub@postgres:5432/user_db
      PORT: "8002"
    depends_on: { postgres: { condition: service_healthy }, redis: { condition: service_healthy } }
    ports: ["8002:8002"]
    command: web

  user-service-listener:
    build: ./services/user-service
    environment:
      <<: *django-env
      DATABASE_URL: postgres://servicehub:servicehub@postgres:5432/user_db
    depends_on: { postgres: { condition: service_healthy }, redis: { condition: service_healthy } }
    command: listener

  # ---------- Provider Service ----------
  provider-service:
    build: ./services/provider-service
    environment:
      <<: *django-env
      DATABASE_URL: postgres://servicehub:servicehub@postgres:5432/provider_db
      PORT: "8003"
    depends_on: { postgres: { condition: service_healthy }, redis: { condition: service_healthy } }
    ports: ["8003:8003"]
    command: web

  # ---------- Booking Service ----------
  booking-service:
    build: ./services/booking-service
    environment:
      <<: *django-env
      DATABASE_URL: postgres://servicehub:servicehub@postgres:5432/booking_db
      PROVIDER_SERVICE_URL: http://provider-service:8003
      PORT: "8004"
    depends_on: { postgres: { condition: service_healthy }, redis: { condition: service_healthy } }
    ports: ["8004:8004"]
    command: web

  # ---------- Review Service ----------
  review-service:
    build: ./services/review-service
    environment:
      <<: *django-env
      DATABASE_URL: postgres://servicehub:servicehub@postgres:5432/review_db
      PROVIDER_SERVICE_URL: http://provider-service:8003
      BOOKING_SERVICE_URL: http://booking-service:8004
      PORT: "8005"
    depends_on: { postgres: { condition: service_healthy }, redis: { condition: service_healthy } }
    ports: ["8005:8005"]
    command: web

  # ---------- Payment Service ----------
  payment-service:
    build: ./services/payment-service
    environment:
      <<: *django-env
      DATABASE_URL: postgres://servicehub:servicehub@postgres:5432/payment_db
      BOOKING_SERVICE_URL: http://booking-service:8004
      PORT: "8006"
    depends_on: { postgres: { condition: service_healthy }, redis: { condition: service_healthy }, rabbitmq: { condition: service_healthy } }
    ports: ["8006:8006"]
    command: web

  payment-service-worker:
    build: ./services/payment-service
    environment:
      <<: *django-env
      DATABASE_URL: postgres://servicehub:servicehub@postgres:5432/payment_db
      BOOKING_SERVICE_URL: http://booking-service:8004
    depends_on: { postgres: { condition: service_healthy }, rabbitmq: { condition: service_healthy } }
    command: worker

  payment-service-listener:
    build: ./services/payment-service
    environment:
      <<: *django-env
      DATABASE_URL: postgres://servicehub:servicehub@postgres:5432/payment_db
    depends_on: { postgres: { condition: service_healthy }, redis: { condition: service_healthy } }
    command: listener

  # ---------- Search Service ----------
  search-service:
    build: ./services/search-service
    environment:
      <<: *django-env
      DATABASE_URL: postgres://servicehub:servicehub@postgres:5432/search_db
      ELASTICSEARCH_URL: http://elasticsearch:9200
      PORT: "8007"
    depends_on: { postgres: { condition: service_healthy }, elasticsearch: { condition: service_healthy } }
    ports: ["8007:8007"]
    command: web

  search-service-listener:
    build: ./services/search-service
    environment:
      <<: *django-env
      DATABASE_URL: postgres://servicehub:servicehub@postgres:5432/search_db
      ELASTICSEARCH_URL: http://elasticsearch:9200
    depends_on: { postgres: { condition: service_healthy }, elasticsearch: { condition: service_healthy }, redis: { condition: service_healthy } }
    command: listener

  # ---------- Chat Service (ASGI / WebSocket) ----------
  chat-service:
    build: ./services/chat-service
    environment:
      <<: *django-env
      DATABASE_URL: postgres://servicehub:servicehub@postgres:5432/chat_db
      PORT: "8008"
    depends_on: { postgres: { condition: service_healthy }, redis: { condition: service_healthy } }
    ports: ["8008:8008"]
    command: asgi

  # ---------- Media Service ----------
  media-service:
    build: ./services/media-service
    environment:
      <<: *django-env
      DATABASE_URL: postgres://servicehub:servicehub@postgres:5432/media_db
      STORAGE_DRIVER: local
      PORT: "8009"
    volumes: ["media_data:/app/uploads"]
    depends_on: { postgres: { condition: service_healthy } }
    ports: ["8009:8009"]
    command: web

  # ---------- Analytics Service ----------
  analytics-service:
    build: ./services/analytics-service
    environment:
      <<: *django-env
      DATABASE_URL: postgres://servicehub:servicehub@postgres:5432/analytics_db
      PORT: "8010"
    depends_on: { postgres: { condition: service_healthy }, redis: { condition: service_healthy } }
    ports: ["8010:8010"]
    command: web

  analytics-service-listener:
    build: ./services/analytics-service
    environment:
      <<: *django-env
      DATABASE_URL: postgres://servicehub:servicehub@postgres:5432/analytics_db
    depends_on: { postgres: { condition: service_healthy }, redis: { condition: service_healthy } }
    command: listener

  # ---------- Notification Service ----------
  notification-service:
    build: ./services/notification-service
    environment:
      <<: *django-env
      DATABASE_URL: postgres://servicehub:servicehub@postgres:5432/notification_db
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      NOTIFICATIONS_FROM: ${NOTIFICATIONS_FROM:-notifications@servicehub.dev}
      PORT: "8011"
    depends_on: { postgres: { condition: service_healthy }, rabbitmq: { condition: service_healthy } }
    ports: ["8011:8011"]
    command: web

  notification-service-worker:
    build: ./services/notification-service
    environment:
      <<: *django-env
      DATABASE_URL: postgres://servicehub:servicehub@postgres:5432/notification_db
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      NOTIFICATIONS_FROM: ${NOTIFICATIONS_FROM:-notifications@servicehub.dev}
    depends_on: { postgres: { condition: service_healthy }, rabbitmq: { condition: service_healthy } }
    command: worker

  notification-service-listener:
    build: ./services/notification-service
    environment:
      <<: *django-env
      DATABASE_URL: postgres://servicehub:servicehub@postgres:5432/notification_db
    depends_on: { postgres: { condition: service_healthy }, redis: { condition: service_healthy } }
    command: listener

  # ---------- Gateway ----------
  gateway:
    build: ./infra/nginx
    depends_on:
      - auth-service
      - user-service
      - provider-service
      - booking-service
      - review-service
      - payment-service
      - search-service
      - chat-service
      - media-service
      - analytics-service
    ports: ["8080:80"]

  # ---------- Frontend ----------
  frontend:
    build: ./frontend
    environment:
      - VITE_API_URL=http://localhost:8080/api
      - VITE_WS_URL=ws://localhost:8080/ws
    depends_on: [gateway]
    ports: ["3000:80"]

volumes:
  pg_data:
  es_data:
  media_data:
