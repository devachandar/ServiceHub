# ServiceHub API Gateway.
#
# Matches Step 6 of the design doc: every request goes React -> Gateway ->
# {service}. Each downstream Django service still enforces its own JWT
# check and RBAC - Nginx here is a routing + rate-limiting + logging layer,
# not the source of truth for auth.

limit_req_zone $binary_remote_addr zone=servicehub_api:10m rate=20r/s;

map $http_upgrade $connection_upgrade {
    default upgrade;
    ""      close;
}

server {
    listen 80;
    server_name _;

    access_log /var/log/nginx/access.log;

    limit_req zone=servicehub_api burst=40 nodelay;

    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
    add_header Access-Control-Allow-Methods "GET, POST, PATCH, PUT, DELETE, OPTIONS" always;
    if ($request_method = OPTIONS) {
        return 204;
    }

    location /api/auth/       { proxy_pass http://auth-service:8001/;       include /etc/nginx/proxy_params.conf; }
    location /api/users/      { proxy_pass http://user-service:8002/;       include /etc/nginx/proxy_params.conf; }
    location /api/providers/  { proxy_pass http://provider-service:8003/;   include /etc/nginx/proxy_params.conf; }
    location /api/bookings/   { proxy_pass http://booking-service:8004/;    include /etc/nginx/proxy_params.conf; }
    location /api/reviews/    { proxy_pass http://review-service:8005/;     include /etc/nginx/proxy_params.conf; }
    location /api/payments/   { proxy_pass http://payment-service:8006/;    include /etc/nginx/proxy_params.conf; }
    location /api/search/     { proxy_pass http://search-service:8007/;     include /etc/nginx/proxy_params.conf; }
    location /api/media/      { proxy_pass http://media-service:8009/;      include /etc/nginx/proxy_params.conf; }
    location /api/analytics/  { proxy_pass http://analytics-service:8010/;  include /etc/nginx/proxy_params.conf; }

    # Chat: plain REST endpoints (conversations, message history)...
    location /api/chat/ {
        proxy_pass http://chat-service:8008/;
        include /etc/nginx/proxy_params.conf;
    }

    # ...and the WebSocket upgrade for real-time messages.
    location /ws/chat/ {
        proxy_pass http://chat-service:8008/ws/chat/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    location /health {
        return 200 '{"service":"gateway","status":"ok"}';
        add_header Content-Type application/json;
    }
}
